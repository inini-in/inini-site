# inini.in — editorial RSS source list (P2.1)
#
# LAW (catalog + R4): headlines + links ONLY. Never scrape or reproduce
# paywalled/article body content. Original commentary only.
# Maintained editorially; every feed carries a dated HTTP-200 verification.
# A feed that goes dead or paywalls its RSS gets status: dropped (kept for
# audit), never silently deleted.

version: 1
verified_at: "2026-06-12"   # curl -L, UA kreeda-feeds-check/1.0; 200 + >=1 <item>
usage: headlines-and-links-only   # R4; no body scraping
audience: >-   # founder, 2026-06-12
  India-national English only. Educated 15–45: students + working
  professionals shaping India's next decade. Mix skews tech / startups /
  education / careers alongside national news.

